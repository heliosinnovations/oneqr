<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Variation 1: Minimal Abstract QR -->
  <!-- Simple, clean geometric squares suggesting QR pattern -->
  <!-- Works well at small sizes due to simplicity -->

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="#ff4d00"/>

  <!-- QR-inspired grid pattern in white -->
  <!-- Top-left corner marker (finder pattern) -->
  <rect x="80" y="80" width="120" height="120" rx="8" fill="#ffffff"/>
  <rect x="100" y="100" width="80" height="80" rx="4" fill="#ff4d00"/>
  <rect x="120" y="120" width="40" height="40" rx="2" fill="#ffffff"/>

  <!-- Top-right corner marker -->
  <rect x="312" y="80" width="120" height="120" rx="8" fill="#ffffff"/>
  <rect x="332" y="100" width="80" height="80" rx="4" fill="#ff4d00"/>
  <rect x="352" y="120" width="40" height="40" rx="2" fill="#ffffff"/>

  <!-- Bottom-left corner marker -->
  <rect x="80" y="312" width="120" height="120" rx="8" fill="#ffffff"/>
  <rect x="100" y="332" width="80" height="80" rx="4" fill="#ff4d00"/>
  <rect x="120" y="352" width="40" height="40" rx="2" fill="#ffffff"/>

  <!-- Center decorative squares (data pattern suggestion) -->
  <rect x="240" y="240" width="32" height="32" fill="#ffffff"/>
  <rect x="290" y="240" width="32" height="32" fill="#ffffff"/>
  <rect x="240" y="290" width="32" height="32" fill="#ffffff"/>
  <rect x="340" y="290" width="32" height="32" fill="#ffffff"/>
  <rect x="290" y="340" width="32" height="32" fill="#ffffff"/>
  <rect x="340" y="340" width="32" height="32" fill="#ffffff"/>
</svg>