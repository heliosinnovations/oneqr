<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Variation 2: Bold QR with Strong Corner Markers -->
  <!-- More prominent QR aesthetic, heavier visual weight -->
  <!-- Orange on white/cream background for contrast -->

  <!-- Background - using brand cream color -->
  <rect width="512" height="512" rx="64" fill="#fffef9"/>

  <!-- Large finder patterns in brand orange -->
  <!-- Top-left finder -->
  <rect x="56" y="56" width="144" height="144" rx="12" fill="#ff4d00"/>
  <rect x="80" y="80" width="96" height="96" rx="8" fill="#fffef9"/>
  <rect x="104" y="104" width="48" height="48" rx="4" fill="#ff4d00"/>

  <!-- Top-right finder -->
  <rect x="312" y="56" width="144" height="144" rx="12" fill="#ff4d00"/>
  <rect x="336" y="80" width="96" height="96" rx="8" fill="#fffef9"/>
  <rect x="360" y="104" width="48" height="48" rx="4" fill="#ff4d00"/>

  <!-- Bottom-left finder -->
  <rect x="56" y="312" width="144" height="144" rx="12" fill="#ff4d00"/>
  <rect x="80" y="336" width="96" height="96" rx="8" fill="#fffef9"/>
  <rect x="104" y="360" width="48" height="48" rx="4" fill="#ff4d00"/>

  <!-- Data pattern squares - denser grid -->
  <g fill="#ff4d00">
    <!-- Row 1 -->
    <rect x="224" y="56" width="40" height="40" rx="4"/>
    <rect x="272" y="56" width="32" height="32" rx="4"/>

    <!-- Row 2 -->
    <rect x="224" y="112" width="32" height="32" rx="4"/>
    <rect x="264" y="120" width="24" height="24" rx="3"/>

    <!-- Center cluster -->
    <rect x="224" y="224" width="64" height="64" rx="8"/>
    <rect x="296" y="224" width="40" height="40" rx="4"/>
    <rect x="344" y="232" width="32" height="32" rx="4"/>

    <rect x="224" y="296" width="40" height="40" rx="4"/>
    <rect x="272" y="304" width="32" height="32" rx="4"/>
    <rect x="312" y="280" width="24" height="24" rx="3"/>

    <!-- Column patterns -->
    <rect x="56" y="224" width="32" height="32" rx="4"/>
    <rect x="104" y="232" width="24" height="24" rx="3"/>
    <rect x="144" y="224" width="32" height="32" rx="4"/>

    <rect x="56" y="272" width="24" height="24" rx="3"/>
    <rect x="96" y="280" width="32" height="32" rx="4"/>
    <rect x="144" y="272" width="24" height="24" rx="3"/>

    <!-- Bottom right data area -->
    <rect x="312" y="344" width="56" height="56" rx="6"/>
    <rect x="376" y="320" width="32" height="32" rx="4"/>
    <rect x="416" y="360" width="40" height="40" rx="4"/>
    <rect x="376" y="400" width="32" height="32" rx="4"/>
    <rect x="320" y="416" width="48" height="40" rx="4"/>
    <rect x="416" y="416" width="40" height="40" rx="4"/>
