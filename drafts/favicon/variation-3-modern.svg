<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Variation 3: Modern Stylized QR -->
  <!-- Rounded, friendly aesthetic with gradient accent -->
  <!-- Single iconic QR symbol, not full pattern -->

  <defs>
    <!-- Gradient for depth -->
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b2b"/>
      <stop offset="100%" style="stop-color:#ff4d00"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="96" fill="url(#orangeGradient)"/>

  <!-- Main QR icon container - white rounded square -->
  <rect x="80" y="80" width="352" height="352" rx="32" fill="#ffffff" filter="url(#shadow)"/>

  <!-- Simplified iconic QR pattern -->
  <!-- Top-left finder -->
  <rect x="112" y="112" width="88" height="88" rx="12" fill="#1a1a1a"/>
  <rect x="128" y="128" width="56" height="56" rx="8" fill="#ffffff"/>
  <rect x="144" y="144" width="24" height="24" rx="4" fill="#ff4d00"/>

  <!-- Top-right finder -->
  <rect x="312" y="112" width="88" height="88" rx="12" fill="#1a1a1a"/>
  <rect x="328" y="128" width="56" height="56" rx="8" fill="#ffffff"/>
  <rect x="344" y="144" width="24" height="24" rx="4" fill="#ff4d00"/>

  <!-- Bottom-left finder -->
  <rect x="112" y="312" width="88" height="88" rx="12" fill="#1a1a1a"/>
  <rect x="128" y="328" width="56" height="56" rx="8" fill="#ffffff"/>
  <rect x="144" y="344" width="24" height="24" rx="4" fill="#ff4d00"/>

  <!-- Modern data pattern - circles and rounded squares -->
  <g fill="#1a1a1a">
    <!-- Alignment pattern (bottom-right) -->
    <rect x="320" y="320" width="72" height="72" rx="10" fill="#1a1a1a"/>
    <rect x="336" y="336" width="40" height="40" rx="6" fill="#ffffff"/>
    <circle cx="356" cy="356" r="10" fill="#ff4d00"/>

    <!-- Scattered data modules -->
    <circle cx="232" cy="136" r="16"/>
    <circle cx="280" cy="136" r="12"/>
    <circle cx="256" cy="180" r="14"/>

    <circle cx="136" cy="232" r="14"/>
    <circle cx="180" cy="256" r="12"/>
    <circle cx="136" cy="280" r="16"/>

    <!-- Center focal point -->
    <circle cx="256" cy="256" r="28" fill="#ff4d00"/>
    <circle cx="256" cy="256" r="14" fill="#ffffff"/>

    <rect x="296" y="232" width="20" height="20" rx="5"/>
    <rect x="232" y="296" width="20" height="20" rx="5"/>
    <rect x="280" y="280" width="16" height="16" rx="4"/>

    <!-- Timing pattern suggestion -->
    <rect x="216" y="112" width="12" height="12" rx="3"/>
    <rect x="248" y="112" width="12" height="12" rx="3"/>
    <rect x="280" y="112" width="12" height="12" rx="3"/>

    <rect x="112" y="216" width="12" height="12" rx="3"/>
    <rect x="112" y="248" width="12" height="12" rx="3"/>
    <rect x="112" y="280" width="12" height="12" rx="3"/>
  </g>
</svg>