<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#fffef9"/>

  <!-- Logo -->
  <text x="600" y="220" text-anchor="middle" font-family="Georgia, serif" font-size="120" font-style="italic" fill="#1a1a1a">
    One<tspan fill="#ff4d00">QR</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="48" fill="#666">
    Free QR Code Generator
  </text>

  <!-- Description -->
  <text x="600" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="32" fill="#666">
    Create, Download, Print - No signup required
  </text>

  <!-- QR Code placeholder -->
  <rect x="500" y="440" width="200" height="200" rx="8" fill="#1a1a1a" opacity="0.1"/>
  <rect x="520" y="460" width="160" height="160" fill="white"/>
  <rect x="540" y="480" width="40" height="40" fill="#1a1a1a"/>
  <rect x="620" y="480" width="40" height="40" fill="#1a1a1a"/>
  <rect x="540" y="560" width="40" height="40" fill="#1a1a1a"/>
  <rect x="580" y="520" width="40" height="40" fill="#1a1a1a"/>
  <rect x="620" y="560" width="40" height="40" fill="#ff4d00"/>
</svg>
