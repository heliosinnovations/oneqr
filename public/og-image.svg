<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#fffef9"/>

  <!-- Background pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f0ede4" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Accent bar at top -->
  <rect width="1200" height="6" fill="#ff5500"/>

  <!-- Logo -->
  <text x="600" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="96" font-style="italic" fill="#1a1a1a">
    The QR <tspan fill="#ff5500">Spot</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" fill="#1a1a1a">
    Free QR Code Generator
  </text>

  <!-- Description -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" fill="#666">
    Create • Download • Print • No signup required
  </text>

  <!-- QR Code visual -->
  <g transform="translate(525, 420)">
    <rect x="0" y="0" width="150" height="150" rx="12" fill="#1a1a1a"/>
    <rect x="10" y="10" width="130" height="130" rx="8" fill="white"/>
    <!-- QR modules -->
    <rect x="20" y="20" width="30" height="30" fill="#1a1a1a"/>
    <rect x="80" y="20" width="30" height="30" fill="#1a1a1a"/>
    <rect x="20" y="80" width="30" height="30" fill="#1a1a1a"/>
    <rect x="50" y="50" width="20" height="20" fill="#1a1a1a"/>
    <rect x="80" y="80" width="30" height="30" fill="#ff5500"/>
    <rect x="55" y="85" width="15" height="15" fill="#1a1a1a"/>
    <rect x="60" y="25" width="10" height="10" fill="#1a1a1a"/>
    <rect x="25" y="60" width="10" height="10" fill="#1a1a1a"/>
  </g>

  <!-- Footer URL -->
  <text x="600" y="610" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#999">
    theqrspot.com
  </text>
</svg>
